name: build WSL

on:
  push:
    branches: [ 'master' ]
    paths:
      - 'config/**'
      - 'resources'
      - 'build.sh'
  pull_request:
    branches: [ 'master' ]
    paths:
      - 'config/**'
      - 'resources'
      - 'build.sh'
  workflow_dispatch:

env:
  ACTION_TOKEN: ${{ secrets.ACTION_TOKEN }}
  DISTRO_VERSION: 25

jobs:
  build:
    name: Build deepin WSL
    runs-on: ubuntu-latest

    steps:
      - name: Read Rootfs version
        run: |
          echo "VERSION=$(curl -s https://raw.githubusercontent.com/deepin-community/deepin-rootfs/master/version.txt | cat)" >> $GITHUB_ENV
        shell: bash
        env:
          GITHUB_ENV: ${{ env.GITHUB_ENV }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build WSL
        run: |
          sudo bash build.sh amd64 "v${{ env.VERSION }}"
          sudo bash build.sh arm64 "v${{ env.VERSION }}"

      - name: Upload file to release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ env.ACTION_TOKEN }}"
          automatic_release_tag: "v${{ env.VERSION }}"
          prerelease: true
          title: "v${{ env.VERSION }}"
          files: |
            deepin${{ env.DISTRO_VERSION }}-amd64.wsl
            deepin${{ env.DISTRO_VERSION }}-arm64.wsl
